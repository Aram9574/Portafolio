name: Weekly Blog Post

on:
  schedule:
    # Lunes 07:00 UTC (08:00 CET en invierno, 09:00 CEST en verano).
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'ID específico del tema (opcional, por defecto coge el siguiente de la cola)'
        required: false
        type: string
      dry_run:
        description: 'Generar placeholder sin llamar a la API'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.topic_id }}" ]; then
            ARGS="$ARGS --topic=${{ inputs.topic_id }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          set +e
          node scripts/generate-weekly-post.mjs $ARGS
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::warning::Cola de temas vacía. Añade temas en content/blog/_queue.json"
            exit 0
          fi
          if [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi

      - name: Detect generated post
        if: steps.generate.outputs.exit_code == '0'
        id: detect
        run: |
          NEW_FILE=$(git status --porcelain content/blog/ | grep '^??' | grep -v '_queue.json' | head -1 | awk '{print $2}')
          if [ -z "$NEW_FILE" ]; then
            echo "No se detectó archivo nuevo. Abortando."
            exit 1
          fi
          SLUG=$(basename "$NEW_FILE" .md)
          TITLE=$(head -20 "$NEW_FILE" | grep '^title:' | head -1 | sed 's/title:\s*//' | sed 's/^"//;s/"$//')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "file=$NEW_FILE" >> $GITHUB_OUTPUT

      - name: Commit to main
        if: steps.generate.outputs.exit_code == '0'
        env:
          SLUG: ${{ steps.detect.outputs.slug }}
          TITLE: ${{ steps.detect.outputs.title }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/blog/
          git commit -m "feat(blog): $TITLE

          Post publicado automáticamente el $DATE.
          Slug: $SLUG
          URL: https://alejandrozakzuk.com/blog/$SLUG"

          git push origin main

          echo "::notice::Post publicado en main: $SLUG"
